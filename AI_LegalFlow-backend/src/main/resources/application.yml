spring:
  application:
    name: LegalFlow

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    # 开发模式：使用H2内存数据库（无需安装，开箱即用）
    url: jdbc:h2:mem:legalflow;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: never

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  ai:
    # 阿里云百炼（通义千问）
    openai:
      api-key: sk-8bef7aa26737405aa7f5c1431714f11d
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-plus
          temperature: 0.7

milvus:
  host: localhost
  port: 19530
  collection-name: legal-documents

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.legalflow: INFO
    org.springframework.ai: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
